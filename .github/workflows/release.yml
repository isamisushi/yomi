name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.1"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package.json version ${PACKAGE_VERSION}."
            echo "Expected tag: ${EXPECTED_TAG}"
            exit 1
          fi

      - name: Build staged packages and release assets
        run: npm run build:cli:package

      - name: Verify package exports
        run: node scripts/verify-react-export.mjs

      - name: Verify packed install
        run: node scripts/verify-packed-install.mjs

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: .crust/npm/assets/*
          fail_on_unmatched_files: true

      - name: Publish npm packages
        run: node scripts/publish-staged-packages.mjs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
